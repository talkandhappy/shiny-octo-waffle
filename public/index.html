<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom Stable Sync</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
    body { margin:0; background:black; overflow:hidden; }
    canvas { width:100vw; height:100vh; display:block; }
    #panel { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.85); color:white; text-align:center; padding:10px; z-index:10; }
    body.fullscreen #panel { display:none; }
    button { cursor:pointer; padding:5px 10px; margin:0 2px; }
</style>
</head>
<body>

<div id="panel">
    <form action="/uploadA" method="post" enctype="multipart/form-data"><input type="file" name="pdf" style="width:80px;"><button>Upload A</button></form>
    <form action="/clear" method="post"><input type="hidden" name="target" value="A"><button>刪除A</button></form>
    <form action="/uploadB" method="post" enctype="multipart/form-data"><input type="file" name="pdf" style="width:80px;"><button>Upload B</button></form>
    <form action="/clear" method="post"><input type="hidden" name="target" value="B"><button>刪除B</button></form>
    <button onclick="A()">A版</button> <button onclick="B()">B版</button> <button onclick="fs()">全螢幕</button>
    <img id="qr-code" style="vertical-align:middle; margin-left:15px; width:40px; height:40px; background:white; padding:2px;">
</div>

<canvas id="pdf"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let state = {}, pdfDoc = null, isRendering = false, pendingPage = null;
    let localActive = localStorage.getItem("activeLang") || "A";
    const canvas = document.getElementById("pdf"), ctx = canvas.getContext("2d");
    
    // QR Code 產生
    const qr = qrcode(0, 'L'); qr.addData(window.location.href); qr.make();
    document.getElementById("qr-code").src = qr.createDataURL(4, 2);

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    socket.on("state", (s) => { state = s; updateView(); });

    async function updateView() {
        const file = localActive === "A" ? state.pdfA : state.pdfB;
        if (!file) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
        if (!pdfDoc || pdfDoc.url !== file) {
            pdfDoc = await pdfjsLib.getDocument(file).promise;
            pdfDoc.url = file;
        }
        render(state.page);
    }

    async function render(pageNum) {
        if (!pdfDoc) return;
        if (isRendering) { pendingPage = pageNum; return; }
        
        isRendering = true;
        pageNum = Math.min(pageNum, pdfDoc.numPages);
        
        try {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        } catch (e) { console.error(e); }
        
        isRendering = false;
        if (pendingPage !== null) { let next = pendingPage; pendingPage = null; render(next); }
    }

    function A(){ localActive="A"; localStorage.setItem("activeLang","A"); updateView(); }
    function B(){ localActive="B"; localStorage.setItem("activeLang","B"); updateView(); }
    function fs(){ document.documentElement.requestFullscreen(); }

    document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT") return;
        if (e.key === "ArrowRight" || e.key === "PageDown") socket.emit("next");
        if (e.key === "ArrowLeft" || e.key === "PageUp") socket.emit("prev");
    });
    document.addEventListener("fullscreenchange", () => document.body.classList.toggle("fullscreen", !!document.fullscreenElement));
</script>
</body>
</html>
