<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v11</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
}

iframe {
    width:100vw;
    height:100vh;
    border:none;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    color:white;
    text-align:center;
    padding:8px;
    z-index:10;
}

body.fullscreen #panel {
    display:none;
}

button {
    margin:2px;
}
</style>
</head>

<body>

<div id="panel">

<!-- upload -->
<form action="/uploadA" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload A</button>
</form>

<form action="/uploadB" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload B</button>
</form>

<hr>

<!-- control -->
<button onclick="setA()">A</button>
<button onclick="setB()">B</button>
<button onclick="prev()">◀</button>
<button onclick="next()">▶</button>
<button onclick="fs()">Fullscreen</button>
<button onclick="qr()">QR</button>

</div>

<iframe id="view"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* ===== 教室共享 ===== */
let page = 1;
let files = {};

// ⭐ 每台設備自己的狀態（重點）
let version = "A";

// ===== server sync page =====
socket.on("page", (p) => {
    page = p;
    render();
});

// ===== files =====
socket.on("files", (f) => {
    files = f;
    render();
});

// ===== render =====
function render(){
    const file = version === "A" ? files.A : files.B;
    if (!file) return;

    document.getElementById("view").src =
        file + "#page=" + page;
}

/* ===== version（不同步）===== */
function setA(){ version = "A"; render(); }
function setB(){ version = "B"; render(); }

/* ===== page control（同步）===== */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

/* ===== fullscreen ===== */
function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});

/* ===== QR ===== */
function qr(){
    window.open("/qr");
}

/* ===== keyboard ===== */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
});
</script>

</body>
</html>
