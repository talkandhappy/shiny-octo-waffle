<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v12</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }

canvas {
    width:100vw;
    height:100vh;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    text-align:center;
    padding:6px;
    z-index:10;
}

body.fullscreen #panel { display:none; }
</style>
</head>

<body>

<div id="panel">

<form action="/uploadA" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload A</button>
</form>

<form action="/uploadB" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload B</button>
</form>

<button onclick="A()">A</button>
<button onclick="B()">B</button>
<button onclick="next()">▶</button>
<button onclick="prev()">◀</button>
<button onclick="fs()">Fullscreen</button>

</div>

<canvas id="pdf"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = {};
let pdfDoc = null;

const canvas = document.getElementById("pdf");
const ctx = canvas.getContext("2d");

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ===== state sync ===== */
socket.on("state", async (s) => {
    state = s;

    const file = s.active === "A" ? s.pdfA : s.pdfB;
    if (!file) return;

    if (!pdfDoc || pdfDoc.url !== file) {
        pdfDoc = await pdfjsLib.getDocument(file).promise;
        pdfDoc.url = file;
    }

    render(s.page);
});

function render(pageNum){
    pdfDoc.getPage(pageNum).then(page => {

        const viewport = page.getViewport({ scale: 1.5 });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        });
    });
}

/* ===== controls ===== */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

function A(){ socket.emit("switch","A"); }
function B(){ socket.emit("switch","B"); }

function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});
</script>

</body>
</html>
