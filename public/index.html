<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Classroom</title>
<style>
body { margin:0; background:black; }
iframe {
    width:100vw;
    height:100vh;
    border:none;
}
#panel {
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    color:white;
    text-align:center;
}
</style>
</head>

<body>

<div id="panel">
<form action="/uploadA" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload A</button>
</form>

<form action="/uploadB" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload B</button>
</form>

<button onclick="switchA()">A</button>
<button onclick="switchB()">B</button>
</div>

<iframe id="viewer"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = {};

socket.on("pdf", (data) => {
    state = data;

    const file = data.active === "A" ? data.pdfA : data.pdfB;

    if (file) {
        document.getElementById("viewer").src = file;
    }
});

function switchA(){
    socket.emit("switch","A");
}
function switchB(){
    socket.emit("switch","B");
}
</script>

</body>
</html>
