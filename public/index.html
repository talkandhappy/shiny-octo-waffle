<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v13 (Keyboard Control)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }

canvas {
    width:100vw;
    height:100vh;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    text-align:center;
    padding:6px;
    z-index:10;
}

body.fullscreen #panel { display:none; }
</style>
</head>

<body>

<div id="panel">
    <form action="/uploadA" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf">
        <button>Upload A</button>
    </form>

    <form action="/uploadB" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf">
        <button>Upload B</button>
    </form>

    <button onclick="A()">A版</button>
    <button onclick="B()">B版</button>
    <button onclick="fs()">全螢幕</button>
</div>

<canvas id="pdf"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = {};
let pdfDoc = null;

let localActive = localStorage.getItem("activeLang") || "A";

const canvas = document.getElementById("pdf");
const ctx = canvas.getContext("2d");

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ===== state sync ===== */
socket.on("state", (s) => {
    state = s;
    updateView();
});

async function updateView() {
    const file = localActive === "A" ? state.pdfA : state.pdfB;
    
    if (!file) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
    }

    if (!pdfDoc || pdfDoc.url !== file) {
        pdfDoc = await pdfjsLib.getDocument(file).promise;
        pdfDoc.url = file;
    }

    render(state.page);
}

function render(pageNum){
    if (!pdfDoc) return;

    if (pageNum > pdfDoc.numPages) {
        pageNum = pdfDoc.numPages;
    }

    pdfDoc.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        });
    });
}

/* ===== controls ===== */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

function A(){ 
    localActive = "A"; 
    localStorage.setItem("activeLang", "A");
    updateView(); 
}

function B(){ 
    localActive = "B"; 
    localStorage.setItem("activeLang", "B");
    updateView(); 
}

function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});

/* ===== ⭐ 新增：鍵盤方向鍵監聽 ===== */
document.addEventListener("keydown", (event) => {
    // 避免在 input 框內打字時觸發翻頁 (雖然目前沒有文字輸入框，但這是好習慣)
    if (event.target.tagName === "INPUT") return;

    if (event.key === "ArrowRight" || event.key === "PageDown") {
        next();
    } else if (event.key === "ArrowLeft" || event.key === "PageUp") {
        prev();
    }
});
</script>

</body>
</html>
