<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
    body { margin:0; background:black; overflow:hidden; }
    canvas { width:100vw; height:100vh; }
    #panel { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.7); color:white; text-align:center; padding:10px; z-index:10; }
    body.fullscreen #panel { display:none; }
    button { cursor: pointer; padding: 5px 10px; }
</style>
</head>
<body>

<div id="panel">
    <form action="/uploadA" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf"><button>Upload A</button>
    </form>
    <form action="/uploadB" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf"><button>Upload B</button>
    </form>
    <button onclick="A()">A版</button>
    <button onclick="B()">B版</button>
    <button onclick="fs()">全螢幕</button>
    <div style="display:inline-block; margin-left:20px; vertical-align:middle;">
        <img id="qr-code" style="width:50px; height:50px; background:white; padding:2px;">
    </div>
</div>

<canvas id="pdf"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let state = {}, pdfDoc = null;
    let localActive = localStorage.getItem("activeLang") || "A";
    const canvas = document.getElementById("pdf"), ctx = canvas.getContext("2d");
    
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // QR Code 產生
    document.getElementById("qr-code").src = "https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=" + encodeURIComponent(window.location.href);

    socket.on("state", (s) => { state = s; updateView(); });

    async function updateView() {
        const file = localActive === "A" ? state.pdfA : state.pdfB;
        if (!file) return;
        if (!pdfDoc || pdfDoc.url !== file) {
            pdfDoc = await pdfjsLib.getDocument(file).promise;
            pdfDoc.url = file;
        }
        render(state.page);
    }

    function render(pageNum) {
        if (!pdfDoc) return;
        pageNum = Math.min(pageNum, pdfDoc.numPages);
        pdfDoc.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            page.render({ canvasContext: ctx, viewport: viewport });
        });
    }

    function A(){ localActive = "A"; localStorage.setItem("activeLang", "A"); updateView(); }
    function B(){ localActive = "B"; localStorage.setItem("activeLang", "B"); updateView(); }
    function fs(){ document.documentElement.requestFullscreen(); }

    document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT") return;
        if (e.key === "ArrowRight" || e.key === "PageDown") socket.emit("next");
        if (e.key === "ArrowLeft" || e.key === "PageUp") socket.emit("prev");
    });

    document.addEventListener("fullscreenchange", () => document.body.classList.toggle("fullscreen", !!document.fullscreenElement));
</script>
</body>
</html>
