<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v13</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
}

iframe {
    width:100vw;
    height:100vh;
    border:none;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    color:white;
    text-align:center;
    padding:8px;
    z-index:10;
}

body.fullscreen #panel {
    display:none;
}

button { margin:2px; }
</style>
</head>

<body>

<div id="panel">

<form action="/uploadA" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload A</button>
</form>

<form action="/uploadB" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload B</button>
</form>

<hr>

<button onclick="setA()">A</button>
<button onclick="setB()">B</button>
<button onclick="prev()">◀</button>
<button onclick="next()">▶</button>
<button onclick="fs()">Fullscreen</button>
<button onclick="qr()">QR</button>

</div>

<iframe id="viewer"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* =========================
   state
========================= */
let state = {};
let page = 1;

/* ⭐ 每台設備自己的語言 */
let version = "A";

/* =========================
   sync from server
========================= */
socket.on("state", (s) => {
    state = s;
    page = s.page;
    render();
});

/* =========================
   render（核心）
========================= */
function render(){
    const file = version === "A" ? state.pdfA : state.pdfB;
    if (!file) return;

    document.getElementById("viewer").src =
        file + "#page=" + page;
}

/* =========================
   version（不同步）
========================= */
function setA(){ version = "A"; render(); }
function setB(){ version = "B"; render(); }

/* =========================
   teacher sync
========================= */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

/* =========================
   fullscreen
========================= */
function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});

/* =========================
   QR
========================= */
function qr(){
    window.open("/qr");
}

/* =========================
   keyboard
========================= */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
});

/* =========================
   auto click render fix
========================= */
setInterval(render, 1000);
</script>

</body>
</html>
