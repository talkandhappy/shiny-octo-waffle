<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v13 - Final Fixed</title>
<style>
    /* 核心：把所有捲軸藏起來，強迫只看一頁 */
    body { margin:0; background:#000; overflow:hidden; font-family: sans-serif; }
    
    #viewer-container {
        width: 100vw;
        height: calc(100vh - 90px);
        overflow: hidden; /* 關鍵：裁切掉下一頁 */
        background: #000;
        display: flex;
        justify-content: center;
        position: relative;
    }

    #viewer { 
        width: 100%; 
        height: 100%; 
        border: none;
        /* 避免 PDF 內部的捲動 */
        pointer-events: none; 
    }

    #panel {
        height: 90px; background: #1a1a1a; color: white;
        text-align: center; padding: 5px 0; z-index: 100;
        border-bottom: 2px solid #333;
    }

    body.fullscreen #panel { display: none; }
    body.fullscreen #viewer-container { height: 100vh; }

    .controls { margin-top: 8px; }
    button { 
        padding: 8px 15px; margin: 0 5px; cursor: pointer;
        background: #333; color: white; border: 1px solid #666; border-radius: 4px;
    }
    .active-ver { background: #007bff !important; }
    #page-info { margin: 0 15px; font-weight: bold; color: #ffeb3b; font-size: 1.2rem; }
    
    /* 覆蓋層：點擊這裡也可以翻頁，且能防止 iframe 搶走焦點 */
    #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 50; cursor: default;
    }
</style>
</head>
<body>

<div id="panel">
    <div style="display:flex; justify-content:center; gap:10px; font-size:12px;">
        <form action="/uploadA" method="post" enctype="multipart/form-data">A版:<input type="file" name="pdf"><button>上傳</button></form>
        <form action="/uploadB" method="post" enctype="multipart/form-data">B版:<input type="file" name="pdf"><button>上傳</button></form>
    </div>
    <div class="controls">
        <button id="btnA" onclick="setVer('A')" class="active-ver">版本 A</button>
        <button id="btnB" onclick="setVer('B')">版本 B</button>
        <button onclick="prev()">◀</button>
        <span id="page-info">1</span>
        <button onclick="next()">▶</button>
        <button onclick="fs()" style="background:#444">全螢幕</button>
    </div>
</div>

<div id="viewer-container">
    <div id="overlay"></div> <!-- 擋住 iframe，防止它搶走鍵盤焦點 -->
    <iframe id="viewer" src=""></iframe>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let state = { pdfA: null, pdfB: null, page: 1 };
let localVersion = "A";
let lastKey = "";

socket.on("state", (s) => {
    state = s;
    document.getElementById("page-info").innerText = "第 " + state.page + " 頁";
    render();
});

function render() {
    const file = localVersion === "A" ? state.pdfA : state.pdfB;
    if (!file) return;

    // 終極參數：
    // #page=X      : 頁碼
    // &view=Fit    : 縮放到適合視窗
    // &toolbar=0&navpanes=0 : 隱藏所有工具
    // &scrollbar=0 : 隱藏捲軸
    const params = `#page=${state.page}&view=Fit&toolbar=0&navpanes=0&scrollbar=0`;
    const newKey = file + params;
    
    if (newKey !== lastKey) {
        // 先清空再賦值，強迫 PDF 重新渲染在頂部
        document.getElementById("viewer").src = file + params;
        lastKey = newKey;
    }
    // 強制把焦點拿回 body，確保鍵盤有效
    document.body.focus();
}

function setVer(v) {
    localVersion = v;
    document.getElementById("btnA").classList.toggle("active-ver", v === 'A');
    document.getElementById("btnB").classList.toggle("active-ver", v === 'B');
    render();
}

function next() { socket.emit("next"); }
function prev() { socket.emit("prev"); }

// --- 鍵盤控制 (最強力攔截) ---
window.addEventListener("keydown", (e) => {
    if (["ArrowRight", "ArrowDown", " ", "PageDown"].includes(e.key)) {
        e.preventDefault();
        next();
    } else if (["ArrowLeft", "ArrowUp", "PageUp"].includes(e.key)) {
        e.preventDefault();
        prev();
    }
}, true);

// 點擊畫面任何地方都自動拿回焦點
document.addEventListener("click", () => { document.body.focus(); });

function fs() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener("fullscreenchange", () => {
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
    setTimeout(render, 500);
});
</script>
</body>
</html>
