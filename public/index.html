<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v12 (Local Language)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }

canvas {
    width:100vw;
    height:100vh;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    text-align:center;
    padding:6px;
    z-index:10;
}

body.fullscreen #panel { display:none; }
</style>
</head>

<body>

<div id="panel">
    <form action="/uploadA" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf">
        <button>Upload A</button>
    </form>

    <form action="/uploadB" method="post" enctype="multipart/form-data" style="display:inline-block;">
        <input type="file" name="pdf">
        <button>Upload B</button>
    </form>

    <button onclick="A()">A</button>
    <button onclick="B()">B</button>
    <button onclick="next()">▶</button>
    <button onclick="prev()">◀</button>
    <button onclick="fs()">Fullscreen</button>
</div>

<canvas id="pdf"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = {};
let pdfDoc = null;

// ⭐ 新增：將當前語言存在本地，預設為 A (確保上傳檔案重整後，不會跳回另一個語言)
let localActive = localStorage.getItem("activeLang") || "A";

const canvas = document.getElementById("pdf");
const ctx = canvas.getContext("2d");

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ===== state sync ===== */
socket.on("state", (s) => {
    state = s;
    updateView(); // 收到全域頁數更新時，刷新畫面
});

// ⭐ 新增：獨立出一個負責載入/更新畫面的函數
async function updateView() {
    // 根據 "本地選擇的語言" 決定要渲染哪個檔案
    const file = localActive === "A" ? state.pdfA : state.pdfB;
    
    if (!file) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
    }

    if (!pdfDoc || pdfDoc.url !== file) {
        pdfDoc = await pdfjsLib.getDocument(file).promise;
        pdfDoc.url = file;
    }

    render(state.page);
}

function render(pageNum){
    if (!pdfDoc) return;

    // ⭐ 防錯：如果老師翻到的頁數大於目前這份簡報的總頁數，就停在最後一頁
    if (pageNum > pdfDoc.numPages) {
        pageNum = pdfDoc.numPages;
    }

    pdfDoc.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        });
    });
}

/* ===== controls ===== */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

// ⭐ 修改：切換語言時只改本地設定，不通知伺服器
function A(){ 
    localActive = "A"; 
    localStorage.setItem("activeLang", "A");
    updateView(); 
}

function B(){ 
    localActive = "B"; 
    localStorage.setItem("activeLang", "B");
    updateView(); 
}

function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});
</script>

</body>
</html>
