<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom v13 - Fixed</title>
<style>
    body { margin:0; background:black; overflow:hidden; font-family: "Microsoft JhengHei", sans-serif; }
    
    /* 修正 1：計算正確高度，避免 PDF 頁面被推擠 */
    #viewer { 
        width: 100vw; 
        height: calc(100vh - 90px); /* 扣掉上方 panel 的高度 */
        border: none; 
        display: block;
    }

    #panel {
        position: relative; /* 改為相對定位，避免壓在 iframe 上方 */
        height: 90px;
        background: rgba(20, 20, 20, 0.95); 
        color: white;
        text-align: center; 
        padding: 5px 0;
        z-index: 10;
        border-bottom: 1px solid #444;
    }

    /* 全螢幕模式下隱藏 panel 並讓 iframe 填滿 */
    body.fullscreen #panel { display: none; }
    body.fullscreen #viewer { height: 100vh; }

    .controls { margin-top: 5px; }
    button { 
        padding: 6px 12px; margin: 0 3px; cursor: pointer;
        background: #333; color: white; border: 1px solid #555; border-radius: 4px;
        font-size: 14px;
    }
    button:hover { background: #555; }
    .active-ver { background: #007bff !important; border-color: #0056b3; font-weight: bold; }
    #page-info { margin: 0 10px; font-weight: bold; color: #ffeb3b; min-width: 80px; display: inline-block; }
    hr { border: 0; border-top: 1px solid #333; margin: 5px 0; }
    input[type="file"] { font-size: 12px; color: #ccc; }
</style>
</head>
<body>

<div id="panel">
    <div style="display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 13px;">
        <form action="/uploadA" method="post" enctype="multipart/form-data">
            A版: <input type="file" name="pdf" required> <button>上傳</button>
        </form>
        <div style="width: 1px; height: 20px; background: #555;"></div>
        <form action="/uploadB" method="post" enctype="multipart/form-data">
            B版: <input type="file" name="pdf" required> <button>上傳</button>
        </form>
    </div>

    <hr>

    <div class="controls">
        <button id="btnA" onclick="setVer('A')" class="active-ver">看 A 版</button>
        <button id="btnB" onclick="setVer('B')">看 B 版</button>
        <span style="color:#555">|</span>
        <button onclick="prev()">◀ 上一頁</button>
        <span id="page-info">Page: 1</span>
        <button onclick="next()">下一頁 ▶</button>
        <button onclick="fs()" style="margin-left:15px; background:#444">全螢幕</button>
        <button onclick="qr()" style="background:#444">QR</button>
    </div>
</div>

<iframe id="viewer"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = { pdfA: null, pdfB: null, page: 1 };
let localVersion = "A"; 
let lastRenderedKey = ""; 

socket.on("state", (s) => {
    state = s;
    document.getElementById("page-info").innerText = "Page: " + state.page;
    render();
});

function render() {
    const file = localVersion === "A" ? state.pdfA : state.pdfB;
    if (!file) return;

    // 修正 2：加入專用 PDF 參數
    // #page=X          -> 跳至該頁
    // &navpanes=0      -> 隱藏左側縮圖
    // &toolbar=0       -> 隱藏上方黑條
    // &view=Fit        -> 頁面完整適應高度與寬度 (防止看到下一頁)
    const pdfParams = `#page=${state.page}&navpanes=0&toolbar=0&view=Fit`;
    const currentKey = file + pdfParams;

    if (currentKey !== lastRenderedKey) {
        document.getElementById("viewer").src = file + pdfParams;
        lastRenderedKey = currentKey;
        console.log("Rendering:", currentKey);
    }
}

function setVer(v) {
    localVersion = v;
    document.getElementById("btnA").classList.toggle("active-ver", v === 'A');
    document.getElementById("btnB").classList.toggle("active-ver", v === 'B');
    render();
}

function next() { socket.emit("next"); }
function prev() { socket.emit("prev"); }

function fs() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener("fullscreenchange", () => {
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});

function qr() { window.open("/qr"); }

document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
});
</script>

</body>
</html>
