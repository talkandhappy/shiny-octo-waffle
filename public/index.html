<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom Final</title>

<style>
body {
    margin:0;
    background:black;
}

iframe {
    width:100vw;
    height:100vh;
    border:none;
}

#panel {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    text-align:center;
    padding:8px;
    z-index:10;
}

body.fullscreen #panel {
    display:none;
}
</style>
</head>

<body>

<div id="panel">

<form action="/uploadA" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload A</button>
</form>

<form action="/uploadB" method="post" enctype="multipart/form-data">
<input type="file" name="pdf">
<button>Upload B</button>
</form>

<button onclick="next()">▶</button>
<button onclick="prev()">◀</button>
<button onclick="fs()">Fullscreen</button>
<button onclick="qr()">QR</button>

</div>

<iframe id="viewer"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = {};

socket.on("state", (s) => {
    state = s;

    const file = s.pdfA || s.pdfB;

    if (!file) return;

    /* 🔥 核心：強制 iframe 正確 PDF 顯示 */
    document.getElementById("viewer").src =
        file + "#page=" + s.page;
});

/* control */
function next(){ socket.emit("next"); }
function prev(){ socket.emit("prev"); }

function fs(){
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", ()=>{
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
});

function qr(){
    window.open("/qr");
}

/* keyboard */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
});
</script>

</body>
</html>
