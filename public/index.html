<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>教室同步系統 v13</title>
<style>
    body { margin:0; background:#000; overflow:hidden; font-family: "Microsoft JhengHei", sans-serif; }
    
    /* 讓 PDF 容器高度精確，避免捲軸出現 */
    #viewer { 
        width: 100vw; 
        height: calc(100vh - 90px); 
        border: none; 
        display: block;
        background: #000;
    }

    #panel {
        height: 90px;
        background: #1a1a1a; 
        color: white;
        text-align: center; 
        padding: 5px 0;
        z-index: 100;
        border-bottom: 1px solid #333;
    }

    /* 全螢幕模式：完全隱藏控制列 */
    body.fullscreen #panel { display: none; }
    body.fullscreen #viewer { height: 100vh; }

    .controls { margin-top: 8px; }
    button { 
        padding: 6px 14px; margin: 0 4px; cursor: pointer;
        background: #333; color: white; border: 1px solid #555; border-radius: 4px;
        font-size: 14px;
    }
    button:hover { background: #555; }
    .active-ver { background: #007bff !important; border-color: #0056b3; font-weight: bold; }
    #page-info { margin: 0 10px; font-weight: bold; color: #ffeb3b; min-width: 80px; display: inline-block; }
    hr { border: 0; border-top: 1px solid #333; margin: 5px 0; }
    form { display: inline-block; font-size: 12px; }
</style>
</head>
<body>

<div id="panel">
    <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
        <form action="/uploadA" method="post" enctype="multipart/form-data">
            A版: <input type="file" name="pdf" required> <button>上傳</button>
        </form>
        <div style="width:1px; height:20px; background:#444"></div>
        <form action="/uploadB" method="post" enctype="multipart/form-data">
            B版: <input type="file" name="pdf" required> <button>上傳</button>
        </form>
    </div>
    <hr>
    <div class="controls">
        <button id="btnA" onclick="setVer('A')" class="active-ver">教材 A</button>
        <button id="btnB" onclick="setVer('B')">教材 B</button>
        <span style="color:#555">|</span>
        <button onclick="prev()">◀ 上一頁</button>
        <span id="page-info">Page: 1</span>
        <button onclick="next()">下一頁 ▶</button>
        <button onclick="fs()" style="margin-left:20px; background:#444">全螢幕</button>
        <button onclick="qr()">QR</button>
    </div>
</div>

<iframe id="viewer"></iframe>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let state = { pdfA: null, pdfB: null, page: 1 };
let localVersion = "A"; 
let lastRenderedKey = ""; 

socket.on("state", (s) => {
    state = s;
    document.getElementById("page-info").innerText = "Page: " + state.page;
    render();
});

function render() {
    const file = localVersion === "A" ? state.pdfA : state.pdfB;
    if (!file) return;

    // 關鍵修正：使用 Fit (完整適應) 並隱藏所有 UI，防止出現下一頁邊緣
    const pdfParams = `#page=${state.page}&navpanes=0&toolbar=0&view=Fit`;
    const currentKey = file + pdfParams;

    if (currentKey !== lastRenderedKey) {
        document.getElementById("viewer").src = file + pdfParams;
        lastRenderedKey = currentKey;
        
        // 修正翻頁失效：翻頁後讓焦點回到主視窗，鍵盤才有用
        setTimeout(() => { window.focus(); }, 150);
    }
}

function setVer(v) {
    localVersion = v;
    document.getElementById("btnA").classList.toggle("active-ver", v === 'A');
    document.getElementById("btnB").classList.toggle("active-ver", v === 'B');
    render();
}

function next() { socket.emit("next"); }
function prev() { socket.emit("prev"); }

// --- 實體鍵盤監聽 ---
document.addEventListener("keydown", e => {
    // 支援方向鍵、空白鍵、PageDown/Up
    if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
        e.preventDefault(); 
        next();
    }
    if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        prev();
    }
}, true); // 使用 Capture 模式

// 強制回收焦點機制：如果使用者點到 PDF 內部，每 1 秒抓回一次焦點
setInterval(() => {
    if (document.activeElement.tagName === "IFRAME") {
        window.focus();
    }
}, 1000);

function fs() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener("fullscreenchange", () => {
    document.body.classList.toggle("fullscreen", !!document.fullscreenElement);
    // 進入全螢幕後重新調整 PDF 比例
    setTimeout(render, 300);
});

function qr() { window.open("/qr"); }
</script>

</body>
</html>
